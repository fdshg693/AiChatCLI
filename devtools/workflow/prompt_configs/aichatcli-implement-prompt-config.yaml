run_name: aichatcli-implement-prompt-config
variables:
  repo_name: AiChatCLI
  task_summary: add or improve prompt-config command support
  acceptance_criteria: support the target prompt-config workflow cleanly through the existing CLI architecture
steps:
  implement:
    prompt: |
      Implement the following feature in `${repo_name}`: ${task_summary}.

      Acceptance criteria: ${acceptance_criteria}.
      Reuse the existing prompt and slash-command architecture where possible, and keep the user-facing behavior coherent with the current CLI.
  review:
    prompt: |
      Review the implementation for `${repo_name}` against the requirements.

      Look for missing behaviors, API or command design inconsistencies, regressions, and spots where the implementation does not match the acceptance criteria.
  apply-review-fixes:
    prompt: |
      Fix the issues identified in the review for `${repo_name}`.

      Prioritize correctness and requirement coverage, and keep any cleanup directly tied to the prompt-config command work.
